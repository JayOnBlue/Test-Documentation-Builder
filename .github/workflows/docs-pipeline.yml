name: Docs Pipeline

# On every push to main that touches force-app/, regenerate technical docs + the
# changelog (deterministic, auto-committed), ask Claude to update the business/
# use-case docs for whatever changed (opened as a PR for review, not auto-merged),
# then build and publish the unified site to GitHub Pages.
#
# One-time setup before this will fully work:
#   1. Settings -> Pages -> Build and deployment -> Source -> "GitHub Actions"
#   2. Settings -> Actions -> General -> Workflow permissions -> allow "Read and
#      write permissions", and check "Allow GitHub Actions to create and approve
#      pull requests" (needed for the business-doc PR step below).
#   3. Add a repo secret CLAUDE_CODE_OAUTH_TOKEN — generate it locally with
#      `claude setup-token` (requires a Claude Pro, Max, Team, or Enterprise plan;
#      this authenticates as your subscription, not a pay-per-token API key).
#      If this secret is absent, the business-doc step is skipped and everything
#      else still runs and deploys.

on:
  push:
    branches: [main]
    paths:
      - 'force-app/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: docs-pipeline
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (full history, needed to diff force-app)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pipeline dependencies
        run: npm ci

      - name: Configure git identity for bot commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Regenerate technical docs (deterministic)
        run: node docs/scripts/extract-technical.js

      - name: Regenerate version history from git log (deterministic)
        run: node docs/scripts/generate-version-history.js

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Ask Claude to update business docs for what changed
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node docs/scripts/author-business-docs.mjs

      - name: Open a PR for any AI-authored business-doc changes
        id: business_pr
        continue-on-error: true  # a failed PR (e.g. permissions not yet set up) must never block the
                                  # deploy below — the deploy uses this run's freshly-built docs/site/
                                  # regardless of whether this push succeeded.
        run: |
          if [ -z "$(git status --porcelain -- docs/business)" ]; then
            echo "No business-doc changes to review."
            exit 0
          fi
          BRANCH="docs-business-update-${{ github.run_number }}"
          git switch -c "$BRANCH"
          git add docs/business
          git commit -m "docs: AI-updated business documentation

          Generated from the force-app changes in ${{ github.sha }}. Review before merging —
          this is the one layer of the pipeline an LLM writes prose for."
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "docs: business documentation update ($(date -u +%Y-%m-%d))" \
            --body "Auto-generated by the docs pipeline from force-app changes in ${{ github.sha }}. Review the prose before merging — everything else in this pipeline is deterministic, this is the one AI-authored layer."
          # Restore main's committed version of docs/business so the rest of this
          # job (and the deployed site) reflects only already-reviewed content.
          git switch main
          git checkout HEAD -- docs/business
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog from the metadata diff (deterministic)
        run: node docs/scripts/generate-changelog.js

      - name: Build the unified site
        run: node docs/scripts/build-site.js

      - name: Commit regenerated technical docs and changelog
        id: commit_facts
        continue-on-error: true  # IMPORTANT: never let a failed push (e.g. branch protection, or repo
                                  # permissions not yet set to "Read and write" — see the setup notes at
                                  # the top of this file) block the deploy step below. docs/site/ was
                                  # already built from this run's fresh data regardless of whether this
                                  # commit lands, so the live site must still get the correct content —
                                  # only the *committed source* would be a push behind, and it self-heals
                                  # on the very next push once permissions are fixed.
        run: |
          git add docs/technical docs/CHANGELOG.md docs/_state
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(docs): regenerate technical docs and changelog [skip ci]"
            git push origin main
          fi

      - name: Warn if the facts commit failed
        if: steps.commit_facts.outcome == 'failure'
        run: |
          echo "::warning::Committing docs/technical + docs/CHANGELOG.md back to main FAILED — the site below"
          echo "::warning::still deploys with this run's correct data, but the repo's committed copy is now"
          echo "::warning::one push behind. This is almost always a permissions problem: Settings -> Actions ->"
          echo "::warning::General -> Workflow permissions -> 'Read and write permissions'. Fix it and the next"
          echo "::warning::push to force-app/ will catch the repo back up automatically."

      - uses: actions/configure-pages@v5
      - name: Upload docs/site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
