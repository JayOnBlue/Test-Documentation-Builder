name: Capture Documentation Screenshots

# Runs the CumulusCI + Robot Framework (SalesforcePlaywright) harness in robot-capture/ against
# a real Salesforce org and commits the resulting PNGs to docs/images.
#
# Auth note: a GitHub-hosted runner has no cached Salesforce CLI session, so it can't reuse an
# "already logged in" browser the way a local run can. Instead this workflow uses a durable
# SFDX Auth URL secret — a refresh-token URL derived from a session you already satisfied
# MFA/passkey on, generated once locally and never expiring on its own:
#
#   sf org display --verbose --json --target-org <org>   # copy the "sfdxAuthUrl" value
#
# Store that value as a repo secret named SF_AUTH_URL (Settings -> Secrets and variables ->
# Actions -> New repository secret). No login screen is ever shown by this workflow — MFA/passkey
# was only ever satisfied once, by you, when you first generated the auth URL.
#
# Start with workflow_dispatch (manual) until you've confirmed a run behaves as expected; add a
# `schedule:` or `push:` trigger once you're comfortable with it running unattended.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-screenshots
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install doc-site dependencies
        run: npm ci

      - name: Regenerate the screenshot manifest from docs/business/**/*.md
        run: node docs/scripts/build-site.js

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CumulusCI + Robot Framework
        run: python -m pip install --upgrade -r robot-capture/requirements.txt

      - name: Install Robot Framework Browser library's Playwright binaries
        run: rfbrowser init

      - name: Install OS packages the Playwright browser needs to actually launch
        run: sudo npx --yes playwright install-deps

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Diagnose SF_AUTH_URL shape (never prints the secret itself)
        run: |
          VAL="${{ secrets.SF_AUTH_URL }}"
          if [ -z "$VAL" ]; then
            echo "::error::SF_AUTH_URL is empty."
            exit 1
          fi
          echo "Length: ${#VAL} characters"
          case "$VAL" in
            force://*) echo "Starts with 'force://': yes" ;;
            *) echo "::warning::Starts with 'force://': NO — the value must start with force:// (with no leading quote/space)." ;;
          esac
          AT_COUNT=$(printf '%s' "$VAL" | tr -cd '@' | wc -c)
          echo "Number of '@' characters: $AT_COUNT (should be exactly 1)"
          AFTER_AT="${VAL#*@}"
          case "$AFTER_AT" in
            http://*|https://*) echo "::warning::The part after '@' starts with http(s):// — the instance URL must NOT include the protocol." ;;
            *) echo "Part after '@' has no http(s):// prefix: OK" ;;
          esac
          BEFORE_AT="${VAL%@*}"
          CREDS="${BEFORE_AT#force://}"
          COLON_COUNT=$(printf '%s' "$CREDS" | tr -cd ':' | wc -c)
          echo "Colons between 'force://' and '@': $COLON_COUNT (should be exactly 2 — clientId:clientSecret:refreshToken)"
          NEWLINES=$(printf '%s' "$VAL" | wc -l)
          echo "Embedded newlines: $NEWLINES (should be 0)"

      - name: Authenticate (reuses an already-logged-in session, no login screen, no MFA/passkey)
        run: |
          if [ -z "${{ secrets.SF_AUTH_URL }}" ]; then
            echo "::error::Repo secret SF_AUTH_URL is not set. See the comment at the top of this workflow file for how to generate it." >&2
            exit 1
          fi
          AUTH_FILE="$(mktemp)"
          # Strip CRLF and any stray surrounding quotes/whitespace a copy-paste might have introduced —
          # the value must be exactly force://<clientId>:<clientSecret>:<refreshToken>@<instanceUrl-without-protocol>
          printf '%s' "${{ secrets.SF_AUTH_URL }}" | tr -d '\r' | sed -e 's/^[[:space:]"'"'"']*//' -e 's/[[:space:]"'"'"']*$//' > "$AUTH_FILE"
          sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --alias ci --set-default
          rm -f "$AUTH_FILE"

      - name: Deploy the demo metadata (Order__c, its tab/app, and the docs-capture permission set)
        run: sf project deploy start --source-dir force-app --target-org ci --wait 10

      - name: Assign the docs-capture permission set to the authenticated user
        run: sf org assign permset --name Order_Management_Docs --target-org ci

      - name: Import the org into CumulusCI's keychain
        working-directory: robot-capture
        run: cci org import ci ci

      - name: Run the capture suite
        working-directory: robot-capture
        run: cci task run capture_docs --org ci

      - name: Upload Robot Framework results (for debugging, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: robot-capture/robot/OrderDemo/results
          if-no-files-found: ignore

      - name: Commit any newly captured screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images docs/screenshot-manifest.json
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "docs: capture screenshots via robot-capture [skip ci]"
            git push
          fi
